<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immobilienangebote | IM Immobilien GmbH Bad Essen</title>
  <meta name="description" content="Aktuelle Immobilienangebote von IM Immobilien GmbH. Häuser, Wohnungen und Gewerbeobjekte im Osnabrücker Land.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = {"theme":{"extend":{"colors":{"brand":{"DEFAULT":"#BF0101"}},"fontFamily":{"heading":["'Inter'","system-ui","sans-serif"],"body":["'Inter'","system-ui","sans-serif"],"drama":["'Playfair Display'","Georgia","serif"]}}}}</script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #F8FAFC; color: #0F172A; -webkit-font-smoothing: antialiased; }
    .fade-in { animation: fadeIn 0.5s ease both; }
    .fade-in-up { animation: fadeInUp 0.6s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .card-hover { transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
    .card-hover:hover img { transform: scale(1.06); }
    .card-hover img { transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
    .filter-btn { transition: all 0.25s ease; }
    .filter-btn:hover { background: #0F172A; color: #fff; }
    .filter-btn.active { background: #BF0101; color: #fff; border-color: #BF0101; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ============================================================
    // CMS DATA — Gleiche Struktur wie objekt.html
    // Später durch API/CMS-Endpoint ersetzbar
    // ============================================================
    const OBJEKTE = [
      {
        id: 1,
        status: "verfügbar",
        badge: "Neu",
        title: "Wohn- u. Gastronomiegebäude",
        location: "Herford - Friedenstal",
        price: 415000,
        priceFormatted: "415.000",
        rooms: 14,
        area: 292,
        plotSize: 1480,
        type: "Gewerbe",
        category: "gewerbe",
        img: "./assets/bild-wohnung.png",
        energyClass: "D",
        yearBuilt: 1965,
        shortDesc: "Vielseitiges Wohn- und Gewerbegebäude mit Gastronomie im EG und 3 Wohneinheiten. Stabile Mieteinnahmen, zentrale Lage."
      },
      {
        id: 2,
        status: "verfügbar",
        badge: "Exklusiv",
        title: "Exklusives Einfamilienhaus mit Garten",
        location: "Osnabrück - Sonnenhügel",
        price: 689000,
        priceFormatted: "689.000",
        rooms: 6,
        area: 185,
        plotSize: 720,
        type: "Haus",
        category: "haus",
        img: "./assets/bild-haus.png",
        energyClass: "A+",
        yearBuilt: 2019,
        shortDesc: "Architektenhaus in Premium-Lage mit KfW-55 Standard, Smart Home, Bulthaup-Küche und südwestlichem Garten."
      },
      {
        id: 3,
        status: "verfügbar",
        badge: "Neu",
        title: "Moderne 3-Zimmer-Eigentumswohnung",
        location: "Osnabrück - Wüste",
        price: 345000,
        priceFormatted: "345.000",
        rooms: 3,
        area: 82,
        plotSize: null,
        type: "Wohnung",
        category: "wohnung",
        img: "./assets/bild-penthouse.png",
        energyClass: "A",
        yearBuilt: 2021,
        shortDesc: "Stilvoller Neubau im lebendigsten Viertel Osnabrücks. Offener Grundriss, Südbalkon, Tiefgarage mit Wallbox."
      },
      {
        id: 4,
        status: "verfügbar",
        badge: "Neu",
        title: "Kapitalanlage: Mehrfamilienhaus",
        location: "Bad Essen - Zentrum",
        price: 520000,
        priceFormatted: "520.000",
        rooms: 12,
        area: 340,
        plotSize: 890,
        type: "Mehrfamilienhaus",
        category: "haus",
        img: "./assets/img-kapitalanlage.png",
        energyClass: "C",
        yearBuilt: 1992,
        shortDesc: "Solide Kapitalanlage mit 4 Wohneinheiten, alle vermietet. Gepflegter Zustand, ruhige Lage im Zentrum von Bad Essen."
      },
      {
        id: 5,
        status: "reserviert",
        badge: "Reserviert",
        title: "Gewerbehalle mit Bürotrakt",
        location: "Melle - Industriegebiet",
        price: 395000,
        priceFormatted: "395.000",
        rooms: 8,
        area: 620,
        plotSize: 2400,
        type: "Gewerbe",
        category: "gewerbe",
        img: "./assets/img-gewerbe.png",
        energyClass: "E",
        yearBuilt: 2005,
        shortDesc: "Moderne Gewerbehalle mit hochwertigem Bürotrakt. 620 m² Nutzfläche auf 2.400 m² Grundstück. Ideale Lage an der A30."
      },
      {
        id: 6,
        status: "verfügbar",
        badge: "Premium",
        title: "Penthouse mit Dachterrasse",
        location: "Osnabrück - Innenstadt",
        price: 785000,
        priceFormatted: "785.000",
        rooms: 4,
        area: 142,
        plotSize: null,
        type: "Wohnung",
        category: "wohnung",
        img: "./assets/bild-penthouse.png",
        energyClass: "A",
        yearBuilt: 2023,
        shortDesc: "Exklusives Penthouse über den Dächern der Altstadt. 60 m² Dachterrasse, Panoramaverglasung, Concierge-Service."
      }
    ];

    const CATEGORIES = [
      { key: "alle", label: "Alle Objekte" },
      { key: "haus", label: "Häuser" },
      { key: "wohnung", label: "Wohnungen" },
      { key: "gewerbe", label: "Gewerbe" }
    ];

    // ============================================================
    // COMPONENTS
    // ============================================================

    const Navbar = () => (
      <nav className="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b border-slate-200/50">
        <div className="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
          <a href="index.html" className="flex items-center gap-2">
            <div className="w-8 h-8 bg-brand text-white flex items-center justify-center rounded-lg font-bold text-sm tracking-tighter">IM</div>
            <span className="font-bold text-lg tracking-tight text-slate-900">IM Immobilien</span>
          </a>
          <div className="hidden md:flex items-center gap-6 text-sm font-medium text-slate-600">
            <a href="index.html#leistungen" className="hover:text-brand transition-colors">Leistungen</a>
            <a href="angebote.html" className="text-brand font-bold">Angebote</a>
            <a href="index.html#ablauf" className="hover:text-brand transition-colors">Ablauf</a>
            <a href="index.html#bewertung" className="hover:text-brand transition-colors">Bewertung</a>
            <a href="index.html#über-uns" className="hover:text-brand transition-colors">Über uns</a>
          </div>
          <a href="index.html#bewertung" className="hidden md:inline-flex items-center justify-center px-5 py-2 bg-brand text-white font-medium text-sm rounded-full hover:bg-red-800 transition-colors">
            Bewertung anfragen
          </a>
          <a href="index.html" className="md:hidden text-sm text-slate-500 font-medium flex items-center gap-1">
            <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6" /></svg>
            Startseite
          </a>
        </div>
      </nav>
    );

    const BadgeColor = ({ badge }) => {
      const colors = {
        "Neu": "bg-brand",
        "Exklusiv": "bg-gradient-to-r from-amber-500 to-amber-600",
        "Premium": "bg-gradient-to-r from-violet-600 to-purple-600",
        "Reserviert": "bg-amber-500",
      };
      return (
        <span className={`${colors[badge] || 'bg-brand'} text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider shadow-md`}>
          {badge}
        </span>
      );
    };

    const PropertyCard = ({ objekt, index }) => {
      const o = objekt;
      return (
        <a
          href={`objekt.html?id=${o.id}`}
          className="fade-in-up card-hover block bg-white rounded-2xl border border-slate-200/80 overflow-hidden group"
          style={{ animationDelay: `${index * 0.08}s` }}
        >
          {/* Image */}
          <div className="relative h-56 sm:h-64 overflow-hidden bg-slate-100">
            <img src={o.img} alt={o.title} className="w-full h-full object-cover" />
            <div className="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
            <div className="absolute top-4 left-4 z-10">
              <BadgeColor badge={o.badge} />
            </div>
            {/* Price overlay */}
            <div className="absolute bottom-4 right-4 bg-white/95 backdrop-blur-sm px-4 py-2 rounded-xl shadow-lg">
              <div className="text-xl font-bold text-slate-900">{'\u20AC'} {o.priceFormatted}</div>
            </div>
          </div>

          {/* Content */}
          <div className="p-5 sm:p-6">
            <h3 className="text-lg font-bold text-slate-900 mb-1.5 line-clamp-1 group-hover:text-brand transition-colors">{o.title}</h3>
            <div className="flex items-center gap-1.5 text-slate-500 text-sm mb-4">
              <svg className="w-3.5 h-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 22s-8-4.5-8-11.8A8 8 0 0112 2a8 8 0 018 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              {o.location}
            </div>

            <p className="text-slate-500 text-sm leading-relaxed mb-5 line-clamp-2">{o.shortDesc}</p>

            {/* Details Row */}
            <div className="flex items-center gap-3 pt-4 border-t border-slate-100 text-sm text-slate-600">
              <div className="flex items-center gap-1.5">
                <svg className="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <span className="font-medium">{o.rooms} Zi.</span>
              </div>
              <div className="w-1 h-1 rounded-full bg-slate-300"></div>
              <div className="flex items-center gap-1.5">
                <svg className="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                  <path d="M3 12h18M3 12v6a2 2 0 002 2h14a2 2 0 002-2v-6M5 12V7a2 2 0 012-2h10a2 2 0 012 2v5"/>
                </svg>
                <span className="font-medium">{o.area} m²</span>
              </div>
              {o.plotSize && (
                <>
                  <div className="w-1 h-1 rounded-full bg-slate-300"></div>
                  <div className="font-medium">{o.plotSize} m² Grund</div>
                </>
              )}
              <div className="ml-auto">
                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wide">{o.type}</span>
              </div>
            </div>
          </div>
        </a>
      );
    };

    const StatsBar = ({ objekte }) => {
      const total = objekte.length;
      const verfügbar = objekte.filter(o => o.status === 'verfügbar').length;
      return (
        <div className="flex items-center gap-6 text-sm text-slate-500">
          <span><strong className="text-slate-900">{total}</strong> Objekte</span>
          <span className="w-1 h-1 rounded-full bg-slate-300"></span>
          <span><strong className="text-green-600">{verfügbar}</strong> verfügbar</span>
        </div>
      );
    };

    // ============================================================
    // APP
    // ============================================================
    const App = () => {
      const [filter, setFilter] = React.useState('alle');
      const [sort, setSort] = React.useState('newest');

      const filtered = OBJEKTE.filter(o => filter === 'alle' || o.category === filter);

      const sorted = [...filtered].sort((a, b) => {
        if (sort === 'price-asc') return a.price - b.price;
        if (sort === 'price-desc') return b.price - a.price;
        if (sort === 'area') return b.area - a.area;
        return b.id - a.id; // newest
      });

      return (
        <div className="min-h-screen">
          <Navbar />

          {/* Hero Header */}
          <div className="relative overflow-hidden">
            <div className="absolute inset-0 z-0">
              <img src="./assets/img-angebote-header.png" alt="Osnabrücker Land Panorama" className="w-full h-full object-cover" />
              <div className="absolute inset-0 bg-gradient-to-r from-black/75 via-black/55 to-black/30"></div>
              <div className="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/20"></div>
            </div>
            <div className="relative z-10 max-w-7xl mx-auto px-4 md:px-6 py-20 md:py-28">
              <div className="max-w-3xl">
                <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 border border-white/10 text-sm text-white/70 mb-6">
                  <span className="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                  {OBJEKTE.filter(o => o.status === 'verfügbar').length} Objekte aktuell verfügbar
                </div>
                <h1 className="text-3xl md:text-5xl lg:text-6xl font-bold text-white leading-tight mb-4">
                  Unsere <span className="font-drama italic text-red-400">Immobilienangebote</span>
                </h1>
                <p className="text-lg md:text-xl text-white/60 max-w-xl leading-relaxed">
                  Handverlesene Objekte im Osnabrücker Land. Jede Immobilie persönlich geprüft von Ingo Christoffer und Martin Berkenkamp.
                </p>
              </div>
            </div>
          </div>

          {/* Filters & Content */}
          <div className="max-w-7xl mx-auto px-4 md:px-6 -mt-8 relative z-10">
            {/* Filter Bar */}
            <div className="bg-white rounded-2xl shadow-lg border border-slate-200/80 p-4 md:p-6 mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div className="flex flex-wrap gap-2">
                {CATEGORIES.map(cat => (
                  <button
                    key={cat.key}
                    onClick={() => setFilter(cat.key)}
                    className={`filter-btn px-4 py-2 rounded-full text-sm font-medium border border-slate-200 ${filter === cat.key ? 'active' : 'bg-white text-slate-600'}`}
                  >
                    {cat.label}
                    {cat.key !== 'alle' && (
                      <span className="ml-1.5 text-xs opacity-60">
                        ({OBJEKTE.filter(o => o.category === cat.key).length})
                      </span>
                    )}
                  </button>
                ))}
              </div>
              <div className="flex items-center gap-4">
                <StatsBar objekte={filtered} />
                <select
                  value={sort}
                  onChange={(e) => setSort(e.target.value)}
                  className="text-sm border border-slate-200 rounded-lg px-3 py-2 bg-white text-slate-600 font-medium focus:outline-none focus:border-brand cursor-pointer"
                >
                  <option value="newest">Neueste zuerst</option>
                  <option value="price-asc">Preis aufsteigend</option>
                  <option value="price-desc">Preis absteigend</option>
                  <option value="area">Größte Fläche</option>
                </select>
              </div>
            </div>

            {/* Grid */}
            {sorted.length > 0 ? (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 pb-12">
                {sorted.map((o, i) => (
                  <PropertyCard key={o.id} objekt={o} index={i} />
                ))}
              </div>
            ) : (
              <div className="text-center py-20">
                <div className="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg className="w-8 h-8 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                  </svg>
                </div>
                <h3 className="text-lg font-bold text-slate-900 mb-2">Keine Objekte gefunden</h3>
                <p className="text-slate-500 mb-6">In dieser Kategorie sind aktuell keine Angebote verfügbar.</p>
                <button onClick={() => setFilter('alle')} className="px-6 py-2.5 bg-brand text-white font-medium rounded-full hover:bg-red-700 transition-colors text-sm">
                  Alle Objekte anzeigen
                </button>
              </div>
            )}
          </div>

          {/* CTA Section */}
          <div className="bg-slate-900 mt-8">
            <div className="max-w-7xl mx-auto px-4 md:px-6 py-16 md:py-20">
              <div className="flex flex-col md:flex-row items-center justify-between gap-8">
                <div className="max-w-xl text-center md:text-left">
                  <h2 className="text-2xl md:text-3xl font-bold text-white mb-3">Ihre Wunschimmobilie nicht dabei?</h2>
                  <p className="text-white/60 text-lg">Wir kennen den Markt im Osnabrücker Land wie unsere eigene Nachbarschaft. Sagen Sie uns, was Sie suchen — wir finden es.</p>
                </div>
                <div className="flex flex-col sm:flex-row gap-3">
                  <a href="tel:01764350716" className="inline-flex items-center justify-center gap-2 px-8 py-4 bg-brand text-white font-semibold rounded-full hover:bg-red-700 transition-all shadow-lg shadow-red-900/30 text-base">
                    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.81.36 1.6.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c1.21.34 2 .57 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    Jetzt anrufen
                  </a>
                  <a href="index.html#bewertung" className="inline-flex items-center justify-center gap-2 px-8 py-4 bg-white/10 text-white font-semibold rounded-full hover:bg-white/20 transition-all border border-white/20 text-base">
                    Immobilie bewerten lassen
                  </a>
                </div>
              </div>
            </div>
          </div>

          {/* Footer */}
          <footer className="bg-slate-950 py-8">
            <div className="max-w-7xl mx-auto px-4 md:px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-slate-500">
              <p>&copy; {new Date().getFullYear()} IM Immobilien GmbH. Alle Rechte vorbehalten.</p>
              <div className="flex gap-6">
                <a href="impressum.html" className="hover:text-brand transition-colors">Impressum</a>
                <a href="datenschutz.html" className="hover:text-brand transition-colors">Datenschutz</a>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <noscript>
    <div style="text-align:center;padding:4rem;font-family:system-ui;">
      <h1>IM Immobilien GmbH — Immobilienangebote</h1>
      <p>Bitte aktivieren Sie JavaScript.</p>
      <p>Telefon: 0176 43 507 169 | 0175 74 661 74</p>
    </div>
  </noscript>
</body>
</html>
