  .oc-form-error{font-size:0.75rem;color:#ef4444;margin-top:0.35rem;min-height:0;overflow:hidden;transition:all .2s;}
  .oc-form-submit{width:100%;padding:0.875rem 1.5rem;background:#BF0101;color:#ffffff;border:none;border-radius:calc(8px * 0.6);font-size:1rem;font-weight:600;cursor:pointer;font-family:'Inter',system-ui,sans-serif;transition:all .25s;margin-top:0.5rem;position:relative;overflow:hidden;}

  #oc-form-success{text-align:center;padding:2rem 0;}
  .oc-form-checkmark{width:64px;height:64px;margin:0 auto 1.5rem;}
  .oc-form-checkmark circle{stroke:#BF0101;stroke-width:2;fill:none;stroke-dasharray:166;stroke-dashoffset:166;animation:oc-circle .6s ease forwards;}
  .oc-form-checkmark path{stroke:#BF0101;stroke-width:3;fill:none;stroke-dasharray:48;stroke-dashoffset:48;animation:oc-check .3s .6s ease forwards;}

  <!-- Reveal Observer: Triggers CSS animations when sections scroll into view -->
  <script>
  (function() {
    function initReveal() {
      var els = document.querySelectorAll(".reveal");
      if (!els.length) return;
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add("revealed");
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
      els.forEach(function(el) { observer.observe(el); });
    }
    /* Wait for React to render, then init observer */
    var checkInterval = setInterval(function() {
      if (document.querySelectorAll(".reveal").length > 0) {
        clearInterval(checkInterval);
        setTimeout(initReveal, 100);
      }
    }, 200);
    /* Ultimate failsafe: force all content visible after 6s */
    setTimeout(function() {
      clearInterval(checkInterval);
      document.querySelectorAll(".reveal:not(.revealed)").forEach(function(el) {
        el.classList.add("revealed");
      });
    }, 6000);
  })();
  </script>

<script id="oc-form-script">
(function(){
  var SLUG = "im-immobilien-osnabrueck-6qng";
  var SUBMIT_URL = "http://152.53.182.209:19991/" + SLUG + "/submit";
  var HP_FIELD = "oc_hp_2yyh";
  var IS_MODAL = true;
  var FIELDS = [{"id":"name","type":"text","required":true,"label":"Ihr Name"},{"id":"email","type":"email","required":true,"label":"E-Mail-Adresse"},{"id":"phone","type":"tel","required":false,"label":"Telefonnummer"},{"id":"message","type":"textarea","required":true,"label":"Ihre Nachricht"}];

  // Track form load time for bot detection
  var loadTime = Date.now();

  function initForm() {
    var form = document.getElementById("oc-contact-form");
    if (!form) return;

    // Set timestamp in hidden field
    var tsField = form.querySelector('input[name="oc_ts"]');
    if (tsField) tsField.value = String(loadTime);

    // ─── Modal open/close ───────────────────────────────
    var modal = document.getElementById("oc-form-modal");
    var backdrop = document.getElementById("oc-form-backdrop");
    var closeBtn = document.getElementById("oc-form-close-btn");

    function openModal() {
      if (!modal) return;
      modal.style.display = "flex";
      document.body.style.overflow = "hidden";
      setTimeout(function() { modal.classList.add("oc-form-visible"); }, 10);
      // Focus first input
      var first = form.querySelector("input:not([type=hidden]), textarea, select");
      if (first) setTimeout(function() { first.focus(); }, 300);
    }

    function closeModal() {
      if (!modal) return;
      modal.classList.remove("oc-form-visible");
      setTimeout(function() {
        modal.style.display = "none";
        document.body.style.overflow = "";
      }, 300);
    }

    if (IS_MODAL) {
      if (backdrop) backdrop.addEventListener("click", closeModal);
      if (closeBtn) closeBtn.addEventListener("click", closeModal);
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape" && modal && modal.style.display !== "none") closeModal();
      });
    }

    // ─── Inline: inject into CTA section ────────────────
    if (!IS_MODAL) {
      var inlineWrap = document.getElementById("oc-form-inline-wrap");
      if (inlineWrap) {
        // Find CTA section (last section before footer, or section with cta-related classes)
        var sections = document.querySelectorAll("section");
        var ctaSection = null;
        for (var i = sections.length - 1; i >= 0; i--) {
          var cls = (sections[i].className || "").toLowerCase();
          var id = (sections[i].id || "").toLowerCase();
          if (cls.indexOf("cta") !== -1 || id.indexOf("cta") !== -1 || cls.indexOf("contact") !== -1 || id.indexOf("contact") !== -1) {
            ctaSection = sections[i];
            break;
          }
        }
        // Fallback: second-to-last section (before footer section)
        if (!ctaSection && sections.length >= 2) {
          ctaSection = sections[sections.length - 1];
        }
        if (ctaSection) {
          // Keep section styling but replace inner content
          var inner = ctaSection.querySelector("div[class*='max-w'], div[class*='container']") || ctaSection;
          // Center the form
          inlineWrap.style.display = "block";
          inner.innerHTML = "";
          inner.appendChild(inlineWrap);
        }
      }
    }

    // ─── Button rewiring ────────────────────────────────
    function rewireButtons() {
      var selectors = [
        ".cta-pulse",
        "button[class*='cta']",
        "a[class*='cta']",
        'a[href*="kontakt"]',
        'a[href*="anfrage"]',
        'a[href*="contact"]',
        'a[href="#kontakt"]',
        'a[href="#contact"]',
        'a[href*="mailto:"]'
      ];
      var allBtns = [];
      selectors.forEach(function(sel) {
        try {
          var els = document.querySelectorAll(sel);
          for (var j = 0; j < els.length; j++) allBtns.push(els[j]);
        } catch(e) {}
      });

      // Deduplicate
      var seen = new Set();
      allBtns.forEach(function(btn) {
        if (seen.has(btn)) return;
        seen.add(btn);
        // Skip form-internal buttons
        if (btn.closest && (btn.closest("#oc-form-modal") || btn.closest("#oc-form-inline-wrap") || btn.closest("nav") || btn.closest("header"))) return;
        // Skip footer links that are navigation
        if (btn.closest && btn.closest("footer")) {
          var href = btn.getAttribute("href") || "";
          if (href.indexOf(".html") !== -1 || href === "/" || href === "#") return;
        }

        btn.addEventListener("click", function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (IS_MODAL) {
            openModal();
          } else {
            var formEl = document.getElementById("oc-contact-form");
            if (formEl) formEl.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        });
      });
    }

    // Wait for React to render, then rewire
    setTimeout(rewireButtons, 500);
    setTimeout(rewireButtons, 1500);
    setTimeout(rewireButtons, 3000);

    // ─── Validation ─────────────────────────────────────
    function validateField(fieldDef, value) {
      if (fieldDef.required && !value.trim()) return fieldDef.label + " ist erforderlich.";
      if (fieldDef.type === "email" && value.trim()) {
        var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRe.test(value.trim())) return "Bitte geben Sie eine gueltige E-Mail-Adresse ein.";
      }
      if (fieldDef.type === "tel" && value.trim()) {
        var telRe = /^[+]?[\d\s\-().]{6,20}$/;
        if (!telRe.test(value.trim())) return "Bitte geben Sie eine gueltige Telefonnummer ein.";
      }
      return "";
    }

    function showError(fieldId, msg) {
      var input = document.getElementById("oc-f-" + fieldId);
      var errEl = document.getElementById("oc-err-" + fieldId);
      if (msg) {
        if (input) input.classList.add("oc-form-input-error");
        if (errEl) errEl.textContent = msg;
      } else {
        if (input) input.classList.remove("oc-form-input-error");
        if (errEl) errEl.textContent = "";
      }
    }

    // Live validation on blur
    FIELDS.forEach(function(fd) {
      var el = document.getElementById("oc-f-" + fd.id);
      if (el) {
        el.addEventListener("blur", function() {
          showError(fd.id, validateField(fd, el.value));
        });
        el.addEventListener("input", function() {
          if (el.classList.contains("oc-form-input-error")) {
            showError(fd.id, validateField(fd, el.value));
          }
        });
      }
    });

    // ─── Submit ─────────────────────────────────────────
    form.addEventListener("submit", function(e) {
      e.preventDefault();

      // Honeypot check
      var hpEl = form.querySelector('input[name="' + HP_FIELD + '"]');
      if (hpEl && hpEl.value) return;

      // Bot timing check (< 2s = suspicious)
      var elapsed = Date.now() - loadTime;
      if (elapsed < 2000) return;

      // Validate all fields
      var hasError = false;
      var data = {};
      FIELDS.forEach(function(fd) {
        var el = document.getElementById("oc-f-" + fd.id);
        var val = el ? el.value : "";
        var err = validateField(fd, val);
        showError(fd.id, err);
        if (err) hasError = true;
        data[fd.id] = val.trim();
      });
      if (hasError) return;

      // Disable button, show spinner
      var btn = document.getElementById("oc-form-btn");
      var btnText = document.getElementById("oc-form-btn-text");
      btn.disabled = true;
      btnText.innerHTML = "Wird gesendet... <span class='oc-form-submit-spinner'></span>";

      // Send
      fetch(SUBMIT_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ fields: data, ts: loadTime })
      })
      .then(function(res) { return res.json(); })
      .then(function(result) {
        if (result.ok) {
          form.style.display = "none";
          document.getElementById("oc-form-success").style.display = "block";
        } else {
          throw new Error(result.error || "Fehler");
        }
      })
      .catch(function() {
        btn.disabled = false;
        btnText.textContent = "Nachricht senden";
        // Show fallback error
        var errDiv = document.createElement("div");
        errDiv.style.cssText = "text-align:center;color:#ef4444;font-size:0.85rem;margin-top:1rem;";
        errDiv.textContent = "Senden fehlgeschlagen. Bitte versuchen Sie es erneut oder schreiben Sie an " + "dustin.althaus@me.com";
        form.appendChild(errDiv);
        setTimeout(function() { errDiv.remove(); }, 5000);
      });
    });
  }

  // Init after React render
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function() { setTimeout(initForm, 600); });
  } else {
    setTimeout(initForm, 600);
  }
})();
</script>

      x.setRequestHeader("Content-Type","application/json");
